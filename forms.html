<script>
const SCHEMA_BASE = 'schemas';
const ORGS = [
    { id: 'vba', label: 'VBA', dir: 'vba', fullName: 'Veterans Benefits Administration' },
    { id: 'vha', label: 'VHA', dir: 'va/vha', fullName: 'Veterans Health Administration' },
    { id: 'nca', label: 'NCA', dir: 'va/nca', fullName: 'National Cemetery Administration' },
    { id: 'facilities', label: 'Facilities', dir: 'va/facilities', fullName: 'Facilities & Logistics' },
    { id: 'admin', label: 'Admin', dir: 'va/admin', fullName: 'VA Administration' },
    { id: 'other', label: 'Other', dir: 'va/other', fullName: 'Standard Forms & Other' }
];

let currentOrg = null;
let currentSchema = null;
let currentStep = 0;
let allFormsByOrg = {};
let formData = {}; // in-memory data model — persists field values across step navigation

const US_STATES = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC','PR','VI','GU','AS','MP'];

// ─── Load/Init ───
async function loadOrgIndex(org) {
    const url = `${SCHEMA_BASE}/${org.dir}/index.json?cb=${Date.now()}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Failed to load ' + url);
    return resp.json();
}

async function loadSchema(org, fileName) {
    const url = `${SCHEMA_BASE}/${org.dir}/${fileName}?cb=${Date.now()}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Failed to load schema');
    return resp.json();
}

async function initTabs() {
    const tabs = document.getElementById('orgTabs');
    for (const org of ORGS) {
        const btn = document.createElement('button');
        btn.className = 'org-tab';
        btn.dataset.orgId = org.id;
        btn.innerHTML = `${org.label} <span class="count">...</span>`;
        btn.onclick = () => selectOrg(org);
        tabs.appendChild(btn);
    }
    const results = await Promise.allSettled(ORGS.map(async org => {
        const idx = await loadOrgIndex(org);
        allFormsByOrg[org.id] = { org, index: idx };
        return { org, index: idx };
    }));
    for (const r of results) {
        if (r.status === 'fulfilled') {
            const { org, index } = r.value;
            const tab = tabs.querySelector(`[data-org-id="${org.id}"]`);
            tab.querySelector('.count').textContent = (index.forms || []).length;
        }
    }
    selectOrg(ORGS[0]);
}

function selectOrg(org) {
    currentOrg = org;
    document.querySelectorAll('.org-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-org-id="${org.id}"]`).classList.add('active');
    renderFormList(org);
}

function renderFormList(org, filterText) {
    const listEl = document.getElementById('formList');
    const data = allFormsByOrg[org.id];
    if (!data) { listEl.innerHTML = '<div class="loading">Loading...</div>'; return; }
    let forms = data.index.forms || [];
    if (filterText) {
        const q = filterText.toLowerCase();
        forms = forms.filter(f => f.name.toLowerCase().includes(q));
    }
    if (!forms.length) { listEl.innerHTML = '<div style="padding:2rem;text-align:center;color:#a9aeb1;font-size:0.82rem;">No forms found</div>'; return; }
    listEl.innerHTML = forms.map(f => {
        const status = f.status || 'unknown';
        const isBio = status === 'bio-reference';
        const badgeClass = isBio ? 'badge-bio' : (status === 'digitized' ? 'badge-digitized' : 'badge-flat');
        const badgeLabel = isBio ? 'BIO (for reference)' : (status === 'digitized' ? 'Digitized' : 'Flat');
        const routing = f.requires3rdParty === 'Yes' || (f.routingTypes && f.routingTypes.length > 0);
        const safeName = (f.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `<div class="form-item" data-file="${f.fileName}" onclick="selectForm('${org.id}','${f.fileName}','${safeName}')">
            <div class="form-item-info">
                <div class="form-item-name">${f.name}</div>
                <div class="form-item-meta">${f.totalFields || 0} fields · ${f.coveragePercent || 0}% mapped${f.pageCount ? ' · ' + f.pageCount + 'pg' : ''}</div>
            </div>
            <div class="form-item-badges">
                <span class="badge ${badgeClass}">${badgeLabel}</span>
                ${routing ? '<span class="badge badge-routing">3rd Party</span>' : ''}
            </div>
        </div>`;
    }).join('');
}

async function selectForm(orgId, fileName, formName) {
    document.querySelectorAll('.form-item').forEach(el => el.classList.remove('active'));
    const item = document.querySelector(`.form-item[data-file="${fileName}"]`);
    if (item) item.classList.add('active');
    const main = document.getElementById('mainPanel');
    main.innerHTML = '<div class="loading" role="status" aria-live="polite"><div class="spinner"></div>Loading form...</div>';
    const org = ORGS.find(o => o.id === orgId);
    try {
        const schema = await loadSchema(org, fileName);
        currentSchema = schema;
        currentStep = 0;
        formData = {}; // reset data model for new form
        renderVAForm(schema, org);
    } catch (e) {
        main.innerHTML = `<div class="empty-state"><h2>Failed to load form</h2><p>${e.message}</p></div>`;
    }
}

// ─── Build sections list for wizard steps ───
function getFormSteps(schema) {
    const vaForm = schema['x-va-form'] || {};
    const formSections = vaForm.formSections || [];
    if (formSections.length > 0) {
        // Enriched schema: each section = one wizard step
        return [
            { type: 'intro', title: 'Introduction' },
            ...formSections.map(s => ({ type: 'section', ...s })),
            { type: 'review', title: 'Review & Submit' }
        ];
    } else {
        // Legacy: no explicit sections — auto-paginate based on field count + page metadata
        const props = schema.properties || {};
        const fieldKeys = Object.keys(props).filter(k => k !== 'x-va-metadata');
        const vaForm = schema['x-va-form'] || {};
        const totalPages = parseInt(vaForm.pages) || 1;

        if (fieldKeys.length <= 12) {
            // Small form: single step with form title
            return [
                { type: 'intro', title: 'Introduction' },
                { type: 'legacy', title: vaForm.formTitle || 'Form Fields' },
                { type: 'review', title: 'Review & Submit' }
            ];
        }

        // For larger forms, chunk fields into pages
        // Target: ~10-12 fields per page, using PDF page count as a guide
        const targetPages = Math.max(totalPages, Math.ceil(fieldKeys.length / 12));
        const chunkSize = Math.ceil(fieldKeys.length / targetPages);
        const sections = [];
        for (let c = 0; c < fieldKeys.length; c += chunkSize) {
            const chunk = fieldKeys.slice(c, c + chunkSize);
            const pageNum = sections.length + 1;
            // Derive section title from the first field in the chunk
            const firstKey = chunk[0];
            const firstDef = props[firstKey] || {};
            const firstVaField = firstDef['x-va-field'] || {};
            let sectionTitle;
            if (targetPages <= 4) {
                // Few pages: use "Part X" naming
                sectionTitle = 'Part ' + pageNum;
            } else {
                // Many pages: use "Page X of Y"
                sectionTitle = 'Page ' + pageNum + ' of ' + targetPages;
            }
            sections.push({
                type: 'legacy',
                title: sectionTitle,
                fieldKeys: chunk
            });
        }
        return [
            { type: 'intro', title: 'Introduction' },
            ...sections,
            { type: 'review', title: 'Review & Submit' }
        ];
    }
}

// ─── Render Form (VA.gov wizard style) ───
function renderVAForm(schema, org) {
    const main = document.getElementById('mainPanel');
    const steps = getFormSteps(schema);
    const vaForm = schema['x-va-form'] || {};
    const formNumber = vaForm.formNumber || schema.title || 'Form';
    const formTitle = vaForm.formTitle || schema.description || '';

    let html = '<div class="va-form-container"><form id="vaForm" onsubmit="return false;">';

    // Breadcrumb
    html += `<div class="va-breadcrumb">
        <a href="forms.html">VA Forms</a> ›
        <a href="forms.html">${esc(org.fullName)}</a> ›
        <span>VA Form ${esc(formNumber)}</span>
    </div>`;

    const step = steps[currentStep];

    // Progress bar (skip on intro page — matches BIO SegmentedProgressBar pattern)
    if (step.type !== 'intro') {
        // BIO only shows segments for content steps (no intro)
        const contentSteps = steps.filter(s => s.type !== 'intro');
        const contentIdx = contentSteps.indexOf(step);
        html += '<div class="va-progress-bar">';
        for (let i = 0; i < contentSteps.length; i++) {
            const cls = i < contentIdx ? 'completed' : (i === contentIdx ? 'active' : '');
            html += `<div class="va-progress-segment ${cls}" title="${esc(contentSteps[i].title)}"></div>`;
        }
        html += '</div>';
        html += `<div class="va-progress-label">Step ${contentIdx + 1} of ${contentSteps.length}: ${esc(step.title)}</div>`;
    }

    if (step.type === 'intro') {
        html += renderIntroStep(schema, vaForm, org, steps);
    } else if (step.type === 'section') {
        html += renderSectionStep(schema, step);
    } else if (step.type === 'legacy') {
        html += renderLegacyStep(schema, step);
    } else if (step.type === 'review') {
        html += renderReviewStep(schema, vaForm, steps);
    }

    // Navigation buttons (skip on intro — intro has its own action link)
    if (step.type !== 'intro') {
        html += '<div class="va-nav-buttons">';
        if (currentStep > 0) {
            html += `<button class="va-btn va-btn--secondary va-btn--back" onclick="navigateStep(-1)">Back</button>`;
        }
        if (currentStep < steps.length - 1) {
            html += `<button class="va-btn va-btn--primary" onclick="navigateStep(1)">Continue</button>`;
        }
        if (step.type === 'review') {
            html += `<button class="va-btn va-btn--primary" onclick="exportFormData()" style="margin-left:auto;">Submit application</button>`;
        }
        html += '</div>';
    }

    html += '</form></div>';
    // aria-live status region for screen readers
    html += '<div id="formStatus" aria-live="polite" aria-atomic="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);"></div>';
    main.innerHTML = html;
    main.scrollTop = 0;

    // Restore saved field values
    restoreFormValues();

    // Focus management: move focus to new page heading (WCAG 2.4.3)
    const heading = main.querySelector('h1, h2');
    if (heading) {
        heading.tabIndex = -1;
        heading.focus();
    }

    // Announce step change to screen readers
    const statusEl = document.getElementById('formStatus');
    if (statusEl && steps && steps[currentStep]) {
        const step = steps[currentStep];
        statusEl.textContent = step.type === 'intro'
            ? 'Form introduction page loaded'
            : 'Step ' + (steps.filter(s => s.type !== 'intro').indexOf(step) + 1) + ': ' + (step.title || 'Review');
    }
}

function renderIntroStep(schema, vaForm, org, steps) {
    const formNumber = vaForm.formNumber || schema.title || 'Form';
    const formTitle = vaForm.formTitle || schema.description || '';
    const instructions = vaForm.instructions || null;
    const formSections = vaForm.formSections || [];
    const props = schema.properties || {};
    const requiredList = new Set(schema.required || []);
    // Auto-generated legacy sections from getFormSteps
    const autoSections = (steps || []).filter(s => s.type === 'legacy' && s.fieldKeys);

    let html = '<div class="va-step-page">';

    // ─── Form Title (matches BIO FormTitle component) ───
    const displayTitle = formTitle || 'VA Form ' + formNumber;
    const subtitleText = 'VA Form ' + formNumber;
    // Skip subtitle if it's the same as the title (avoids "VA Form 21-4193" shown twice)
    const showSubtitle = displayTitle.replace(/\s+/g, ' ').trim().toLowerCase() !== subtitleText.toLowerCase();
    html += `<div class="va-form-intro">
        <h1>${esc(displayTitle)}</h1>
        ${showSubtitle ? '<div class="va-form-subtitle">' + esc(subtitleText) + '</div>' : ''}
    </div>`;

    // ─── "Follow these steps" heading ───
    html += `<h2 class="vads-u-font-size--h3" style="font-family:var(--vads-font-sans);font-size:1.1rem;font-weight:700;margin:1rem 0 0.25rem;">Follow these steps to submit VA Form ${esc(formNumber)}</h2>`;

    // ─── Process List (matches <va-process-list>) ───
    html += '<div class="va-process-list">';

    // Step 1: Gather your information
    html += '<div class="va-process-list-item" data-step="1">';
    html += '<h3>Gather your information</h3>';

    // Build "what you'll need" from schema sections + required fields
    if (formSections.length > 0) {
        html += '<p><strong>Here\'s what this form will ask for:</strong></p><ul>';
        for (const sec of formSections) {
            if (sec.title && sec.title !== 'Additional Information') {
                html += `<li>${esc(sec.title)}</li>`;
            }
        }
        html += '</ul>';
    } else {
        // Legacy: list required fields
        const reqFields = [];
        for (const [key, def] of Object.entries(props)) {
            const vaField = def?.['x-va-field'] || {};
            if (requiredList.has(key) && vaField.label) reqFields.push(vaField.label);
        }
        if (reqFields.length > 0) {
            html += '<p><strong>You\'ll need this information to complete this form:</strong></p><ul>';
            for (const f of reqFields) html += `<li>${esc(f)}</li>`;
            html += '</ul>';
        }
    }
    html += '</div>';

    // Step 2: Fill out the form
    html += '<div class="va-process-list-item" data-step="2">';
    html += '<h3>Fill out and sign the form</h3>';
    html += `<p>We'll take you through each step of the process. It should take about ${esc(vaForm.respondentBurden || '15 minutes')} to complete this form.</p>`;
    html += '</div>';

    // Step 3: Submit the form
    html += '<div class="va-process-list-item" data-step="3">';
    html += '<h3>Submit the form</h3>';
    html += '<p>After you submit the form, you\'ll receive a confirmation message. You can print this for your records.</p>';
    html += '</div>';

    html += '</div>'; // end process list

    // ─── Action Link (green arrow CTA — matches <VaLinkAction>) ───
    html += `<button class="va-action-link" onclick="navigateStep(1)">Start VA Form ${esc(formNumber)}</button>`;

    // ─── OMB Info (matches <va-omb-info>) ───
    if (vaForm.ombNumber || vaForm.respondentBurden) {
        html += '<div class="va-omb-info">';
        if (vaForm.respondentBurden) {
            html += `<strong>Respondent burden:</strong> ${esc(vaForm.respondentBurden)}<br>`;
        }
        if (vaForm.ombNumber) {
            html += `<strong>OMB Control #:</strong> ${esc(vaForm.ombNumber)}<br>`;
        }
        html += `<strong>Expiration date:</strong> Refer to form for current date<br>`;
        html += '<strong>Privacy Act Statement:</strong> VA Form ' + esc(formNumber) + ' collects the information needed to process your request under applicable federal laws.';
        html += '</div>';
    }

    html += '</div>';
    return html;
}

// ─── Shared helpers for name grouping and label disambiguation ───
function detectNameGroups(fieldEntries) {
    const consumed = new Set();
    const groups = [];
    const nameRe = /^(.+?)(first\s*name|last\s*name|middle\s*(?:initial|name)\d*)$/i;
    for (let n = 0; n < fieldEntries.length; n++) {
        const [key] = fieldEntries[n];
        const nm = key.match(nameRe);
        if (!nm) continue;
        const prefix = nm[1];
        const part = nm[2].toLowerCase();
        if (part.startsWith('first')) {
            let lastIdx = -1, middleIdx = -1;
            for (let k = 0; k < fieldEntries.length; k++) {
                if (k === n) continue;
                const km = fieldEntries[k][0].match(nameRe);
                if (!km || km[1] !== prefix) continue;
                const kp = km[2].toLowerCase();
                if (kp.startsWith('last')) lastIdx = k;
                else if (kp.startsWith('middle')) middleIdx = k;
            }
            if (lastIdx !== -1) {
                const groupLabel = prefix
                    ? humanize(prefix).replace(/s$/i, '') + "'s Full Name"
                    : 'Full Name';
                groups.push({ prefix, firstIdx: n, lastIdx, middleIdx, label: groupLabel });
                consumed.add(n);
                consumed.add(lastIdx);
                if (middleIdx !== -1) consumed.add(middleIdx);
            }
        }
    }
    return { nameGroups: groups, nameGroupConsumed: consumed };
}

function buildLabelCounts(fieldEntries) {
    const counts = {};
    for (const [key, def] of fieldEntries) {
        const vaField = def?.['x-va-field'] || {};
        const lbl = vaField.label || humanize(key);
        counts[lbl] = (counts[lbl] || 0) + 1;
    }
    return counts;
}

function disambiguateLabel(label, labelCounts, labelSeen) {
    if (labelCounts[label] > 1) {
        labelSeen[label] = (labelSeen[label] || 0) + 1;
        if (labelSeen[label] > 1) return label + ' (' + labelSeen[label] + ')';
    }
    return label;
}

// ─── Detect redundant "combined name" fields like "veteranSNameFirstMiddleInitialLast" ───
// These duplicate individual first/middle/last fields and should be suppressed.
// ─── Filter out OMB/form metadata fields that aren't user-fillable data ───
function isFormMetadataField(fieldId) {
    const k = fieldId.toLowerCase();
    // OMB approval / control numbers, burden statements, privacy act, form admin fields
    if (/^omb|ombapproval|ombcontrol|ombnumber|ombexpiration/i.test(k)) return true;
    if (/^respondent.*burden|^paperwor.*reduction|^privacyact|^publicreporting|^penaltystatement/i.test(k)) return true;
    if (/^burdenestimate|^reportingburden/i.test(k)) return true;
    // Exact matches for common form-level metadata keys
    if (['vaformnumber', 'vadate', 'formapproval', 'formnumber'].includes(k)) return true;
    return false;
}

function isRedundantCombinedName(fieldId, allFieldIds) {
    // Match patterns like: veteranSNameFirstMiddleInitialLast, veteranServicememberSNameFirstMiddleInitialLast
    if (!/name.*first.*last|first.*middle.*last/i.test(fieldId)) return false;
    // Check if there are individual name parts for the same entity in this section
    const prefix = fieldId.replace(/s?name.*$/i, '').toLowerCase();
    const hasFirst = allFieldIds.some(k => {
        const kl = k.toLowerCase();
        return kl !== fieldId.toLowerCase() && (kl.includes('firstname') || kl.includes('first_name'))
            && (prefix === '' || kl.startsWith(prefix));
    });
    const hasLast = allFieldIds.some(k => {
        const kl = k.toLowerCase();
        return kl !== fieldId.toLowerCase() && (kl.includes('lastname') || kl.includes('last_name') || kl.includes('lastna'))
            && (prefix === '' || kl.startsWith(prefix));
    });
    return hasFirst && hasLast;
}

// ─── Heuristic required: mark common VA form fields as required when schema doesn't specify ───
function inferRequired(fieldId, requiredList, vaField) {
    // If schema already marks it, use that
    if (requiredList.has(fieldId) || vaField?.required) return true;
    // Heuristic: these key patterns are almost always required on VA forms
    const k = fieldId.toLowerCase();
    if (/^(veteran|claimant|applicant).*first.*name$/i.test(fieldId)) return true;
    if (/^(veteran|claimant|applicant).*last.*name$/i.test(fieldId)) return true;
    if (/fullname|full_name/i.test(fieldId) && /veteran|claimant|applicant/i.test(fieldId)) return true;
    if (/socialsecurity|ssn/i.test(fieldId)) return true;
    if (/dateofbirth|dob/i.test(fieldId)) return true;
    return false;
}

function renderNameGroupHtml(grp, fieldEntries) {
    const firstKey = fieldEntries[grp.firstIdx][0];
    const lastKey = fieldEntries[grp.lastIdx][0];
    const middleKey = grp.middleIdx !== -1 ? fieldEntries[grp.middleIdx][0] : null;
    return `<fieldset class="va-field">
        <legend class="va-field-label">${esc(grp.label)}</legend>
        <div class="va-address-row" style="gap:0.75rem;">
            <div class="va-field" style="flex:2;">
                <label for="f_${firstKey}">First name</label>
                <input type="text" id="f_${firstKey}" name="${firstKey}">
            </div>
            ${middleKey ? '<div class="va-field" style="flex:0.5;"><label for="f_' + middleKey + '">Middle</label><input type="text" id="f_' + middleKey + '" name="' + middleKey + '" maxlength="1"></div>' : ''}
            <div class="va-field" style="flex:2;">
                <label for="f_${lastKey}">Last name</label>
                <input type="text" id="f_${lastKey}" name="${lastKey}">
            </div>
        </div>
    </fieldset>`;
}

function renderSectionStep(schema, section) {
    resetSigCounter();
    const props = schema.properties || {};
    const requiredList = new Set(schema.required || []);
    const defs = schema.definitions || {};

    // ─── Pre-scan: flatten all field IDs in this section for name grouping + label dedup ───
    const flatFieldEntries = [];
    if (section.rows) {
        for (const row of section.rows) {
            for (const col of row.columns) {
                let fieldDef = props[col.fieldId];
                if (!fieldDef) continue;
                if (fieldDef.oneOf) {
                    const objDef = fieldDef.oneOf.find(o => o.type === 'object');
                    if (objDef) fieldDef = objDef;
                }
                if (fieldDef.type === 'object' && fieldDef.properties && !fieldDef['x-va-field']) {
                    for (const [subId, subDef] of Object.entries(fieldDef.properties)) {
                        let resolved = subDef;
                        if (subDef.$ref) {
                            const refName = subDef.$ref.replace('#/definitions/', '');
                            resolved = defs[refName] || subDef;
                        }
                        flatFieldEntries.push([col.fieldId + '.' + subId, resolved]);
                    }
                } else {
                    flatFieldEntries.push([col.fieldId, fieldDef]);
                }
            }
        }
    }
    const { nameGroups: secNameGroups, nameGroupConsumed: secConsumed } = detectNameGroups(flatFieldEntries);
    const secLabelCounts = buildLabelCounts(flatFieldEntries);
    const secLabelSeen = {};
    // Build a set of consumed compound IDs for quick lookup
    const consumedIds = new Set();
    for (const idx of secConsumed) consumedIds.add(flatFieldEntries[idx][0]);
    // Map firstName compound IDs to their group
    const firstIdToGroup = {};
    for (const grp of secNameGroups) firstIdToGroup[flatFieldEntries[grp.firstIdx][0]] = grp;

    let html = '<div class="va-step-page">';
    html += `<h2>${esc(section.title)}</h2>`;
    if (section.instructions) {
        html += `<div class="step-description">${esc(section.instructions)}</div>`;
    }
    if (section.note) {
        html += `<div class="va-alert va-alert--warning"><p>${esc(section.note)}</p></div>`;
    }
    // Collect all field IDs in this section for redundancy detection
    const sectionFieldIds = [];
    if (section.rows) {
        for (const row of section.rows) {
            for (const col of row.columns) sectionFieldIds.push(col.fieldId);
        }
    }
    if (section.rows) {
        for (const row of section.rows) {
            for (const col of row.columns) {
                let fieldDef = props[col.fieldId];
                if (!fieldDef) continue;

                // Skip redundant combined name fields (e.g. "veteranSNameFirstMiddleInitialLast")
                if (isRedundantCombinedName(col.fieldId, sectionFieldIds)) continue;
                // Skip OMB/form metadata fields that aren't user data
                if (isFormMetadataField(col.fieldId)) continue;

                // Handle oneOf wrappers (e.g. claimantInformation with oneOf: [null, {object}])
                if (fieldDef.oneOf) {
                    const objDef = fieldDef.oneOf.find(o => o.type === 'object');
                    if (objDef) fieldDef = objDef;
                }

                // If this is a nested object with its own properties (BIO-style), expand sub-fields
                if (fieldDef.type === 'object' && fieldDef.properties && !fieldDef['x-va-field']) {
                    const subReq = new Set(fieldDef.required || []);
                    if (fieldDef.description) {
                        // Skip description if it's substantially the same as the section heading
                        const normDesc = fieldDef.description.replace(/[^a-z0-9\s]/gi, '').replace(/\s+/g, ' ').trim().toLowerCase();
                        const normTitle = section.title.replace(/[^a-z0-9\s]/gi, '').replace(/\s+/g, ' ').trim().toLowerCase();
                        if (normDesc !== normTitle) {
                            html += `<div class="step-description" style="margin-bottom:0.75rem;color:#323a45;">${esc(fieldDef.description)}</div>`;
                        }
                    }
                    for (const [subId, subDef] of Object.entries(fieldDef.properties)) {
                        // Resolve $ref
                        let resolved = subDef;
                        if (subDef.$ref) {
                            const refName = subDef.$ref.replace('#/definitions/', '');
                            resolved = defs[refName] || subDef;
                        }
                        const compoundId = col.fieldId + '.' + subId;

                        // Name group: skip consumed fields, render group at firstName
                        if (consumedIds.has(compoundId)) {
                            const grp = firstIdToGroup[compoundId];
                            if (grp) {
                                html += '<div class="va-form-row"><div class="col-12">';
                                html += renderNameGroupHtml(grp, flatFieldEntries);
                                html += '</div></div>';
                            }
                            continue;
                        }

                        const subVaField = resolved['x-va-field'] || {};
                        // Use sub-field's description or humanized sub-key as label (not the compound ID)
                        let subLabel = subVaField.label || resolved.description || humanize(subId);
                        subLabel = disambiguateLabel(subLabel, secLabelCounts, secLabelSeen);
                        html += '<div class="va-form-row"><div class="col-12">';
                        html += renderVAField(compoundId, resolved, { ...subVaField, label: subLabel }, subReq.has(subId));
                        html += '</div></div>';
                    }
                } else {
                    // Skip consumed name group fields
                    if (consumedIds.has(col.fieldId)) {
                        const grp = firstIdToGroup[col.fieldId];
                        if (grp) {
                            html += '<div class="va-form-row"><div class="col-12">';
                            html += renderNameGroupHtml(grp, flatFieldEntries);
                            html += '</div></div>';
                        }
                        continue;
                    }

                    // Normal flat field
                    const vaField = fieldDef['x-va-field'] || {};
                    let label = vaField.label || humanize(col.fieldId);
                    label = disambiguateLabel(label, secLabelCounts, secLabelSeen);
                    const isRequired = inferRequired(col.fieldId, requiredList, vaField);
                    html += '<div class="va-form-row">';
                    html += `<div class="col-${col.width}">`;
                    html += renderVAField(col.fieldId, fieldDef, { ...vaField, label }, isRequired);
                    html += '</div></div>';
                }
            }
        }
    }
    html += '</div>';
    return html;
}

function renderLegacyStep(schema, step) {
    resetSigCounter();
    step = step || {};
    const props = schema.properties || {};
    const requiredList = new Set(schema.required || []);
    const allowedKeys = step.fieldKeys ? new Set(step.fieldKeys) : null;
    const fieldEntries = Object.entries(props).filter(([k]) => k !== 'x-va-metadata' && (!allowedKeys || allowedKeys.has(k)));
    const meta = schema['x-va-metadata'] || {};
    const formUrl = meta.formUrl || '';

    let html = '<div class="va-step-page">';

    // If there are no fields at all, show a flat-form message instead of an empty page
    if (fieldEntries.length === 0) {
        html += '<h2>Form Not Yet Available</h2>';
        html += '<div class="va-alert va-alert--warning" role="alert" aria-live="assertive" style="border-left:4px solid var(--vads-color-warning);background:var(--vads-color-warning-light);padding:1.5rem;margin-bottom:1.5rem;">';
        html += '<h3 style="margin-bottom:0.5rem;">This form could not be digitized automatically</h3>';
        html += '<p style="margin-bottom:0.75rem;">The source PDF for this form uses a format that our parser could not extract fields from (likely a scanned image or non-standard PDF structure). This form is queued for re-digitization with enhanced extraction.</p>';
        if (formUrl) {
            html += '<p><strong>In the meantime</strong>, you can <a href="' + esc(formUrl) + '" target="_blank" rel="noopener" style="color:var(--vads-color-primary);text-decoration:underline;">download the original PDF</a> to fill it out manually.</p>';
        }
        html += '</div>';
        html += '</div>';
        return html;
    }

    // Section title from step (auto-section) or x-va-form or fallback
    const vaForm = schema['x-va-form'] || {};
    const sectionTitle = step.title || vaForm.formTitle || 'Form Fields';
    html += `<h2>${esc(sectionTitle)}</h2>`;

    // ─── Pre-scan: shared helpers for label dedup and name grouping ───
    const labelCounts = buildLabelCounts(fieldEntries);
    const labelSeen = {};
    const { nameGroups, nameGroupConsumed } = detectNameGroups(fieldEntries);
    const allLegacyKeys = fieldEntries.map(e => e[0]);

    // ─── Detect repeated field groups and render as tables ───
    // Parse field keys to find numbered groups: "date1","from1","amount1","date2","from2","amount2"...
    const numRe = /^(.+?)(\d+)$/;
    let i = 0;
    while (i < fieldEntries.length) {
        const [key, def] = fieldEntries[i];

        // Check if this field is consumed by a name group
        if (nameGroupConsumed.has(i)) {
            const grp = nameGroups.find(g => g.firstIdx === i);
            if (grp) html += renderNameGroupHtml(grp, fieldEntries);
            i++;
            continue;
        }

        // Try to detect a table starting at position i
        const m = key.match(numRe);
        if (m) {
            const basePrefix = m[1];
            const startNum = parseInt(m[2]);

            // Look ahead to find how many columns in this row (consecutive fields with same suffix number)
            const cols = [];
            let j = i;
            while (j < fieldEntries.length) {
                const mj = fieldEntries[j][0].match(numRe);
                if (mj && parseInt(mj[2]) === startNum) {
                    cols.push(mj[1]); // column base name
                    j++;
                } else {
                    break;
                }
            }

            // Now check if the NEXT fields repeat the same column pattern with the next number
            if (cols.length >= 2) {
                let rowCount = 1;
                let scanPos = j;
                while (scanPos < fieldEntries.length) {
                    // Check if next N fields match the column pattern
                    let matchesPattern = true;
                    const nextRowNum = startNum + rowCount;
                    for (let c = 0; c < cols.length; c++) {
                        if (scanPos + c >= fieldEntries.length) { matchesPattern = false; break; }
                        const mk = fieldEntries[scanPos + c][0].match(numRe);
                        if (!mk || mk[1] !== cols[c]) { matchesPattern = false; break; }
                    }
                    if (matchesPattern) {
                        rowCount++;
                        scanPos += cols.length;
                    } else {
                        break;
                    }
                }

                // If we found 3+ rows of the same pattern, render as a table
                if (rowCount >= 3) {
                    const colHeaders = cols.map(c => {
                        const sampleKey = c + startNum;
                        const sampleDef = props[sampleKey];
                        const vaField = sampleDef?.['x-va-field'] || {};
                        return vaField.label || humanize(c);
                    });

                    html += '<div class="va-table-group" style="margin:1.5rem 0;">';
                    html += '<table style="width:100%;border-collapse:collapse;border:1px solid #d6d7d9;">';
                    html += '<thead><tr style="background:#f1f1f1;">';
                    for (const h of colHeaders) {
                        html += '<th style="padding:0.5rem 0.75rem;text-align:left;border:1px solid #d6d7d9;font-weight:600;">' + esc(h) + '</th>';
                    }
                    html += '<th style="padding:0.5rem 0.75rem;text-align:left;border:1px solid #d6d7d9;font-weight:600;width:2rem;">#</th>';
                    html += '</tr></thead><tbody>';

                    for (let r = 0; r < rowCount; r++) {
                        const rowIdx = i + r * cols.length;
                        html += '<tr>';
                        for (let c = 0; c < cols.length; c++) {
                            const [fKey, fDef] = fieldEntries[rowIdx + c];
                            const vaField = fDef?.['x-va-field'] || {};
                            const widgetType = vaField.widget || fDef.format || fDef.type || 'text';
                            let inputType = 'text';
                            if (widgetType === 'date' || fDef.format === 'date') inputType = 'date';
                            else if (widgetType === 'number' || fDef.type === 'number') inputType = 'number';
                            html += '<td style="padding:0.25rem 0.5rem;border:1px solid #d6d7d9;">';
                            html += '<input type="' + inputType + '" name="' + esc(fKey) + '" id="f_' + esc(fKey) + '"';
                            html += ' style="width:100%;padding:0.35rem 0.5rem;border:1px solid #aeb0b5;border-radius:3px;"';
                            if (inputType === 'date') html += ' placeholder="mm/dd/yyyy"';
                            html += '>';
                            html += '</td>';
                        }
                        html += '<td style="padding:0.25rem 0.5rem;border:1px solid #d6d7d9;color:#71767a;font-size:0.85rem;text-align:center;">' + (r + 1) + '</td>';
                        html += '</tr>';
                    }

                    html += '</tbody></table></div>';
                    i += rowCount * cols.length;
                    continue;
                }
            }
        }

        // Skip redundant combined name fields
        if (isRedundantCombinedName(key, allLegacyKeys)) { i++; continue; }
        // Skip OMB/form metadata fields that aren't user data
        if (isFormMetadataField(key)) { i++; continue; }

        // Regular field — render normally
        const vaField = def?.['x-va-field'] || {};
        let label = vaField.label || humanize(key);
        label = disambiguateLabel(label, labelCounts, labelSeen);
        const isRequired = inferRequired(key, requiredList, vaField);
        html += renderVAField(key, def, { ...vaField, label }, isRequired);
        i++;
    }
    html += '</div>';
    return html;
}

function renderReviewStep(schema, vaForm, steps) {
    const formNumber = vaForm.formNumber || schema.title || 'Form';
    const props = schema.properties || {};

    let html = '<div class="va-step-page">';
    html += '<h2>Review your information</h2>';
    html += '<div class="step-description">Please review the information you entered before submitting.</div>';

    const sectionSteps = steps.filter(s => s.type === 'section');
    if (sectionSteps.length > 0) {
        for (let i = 0; i < sectionSteps.length; i++) {
            const s = sectionSteps[i];
            const stepIdx = steps.indexOf(s);
            const accId = 'review-acc-' + i;

            html += '<div class="va-review-accordion">';
            html += `<button class="va-review-accordion-header" aria-expanded="false" aria-label="Section: ${esc(s.title)}, click to expand or collapse" onclick="toggleAccordion('${accId}', this)">
                <span>${esc(s.title)}</span>
                <span class="va-accordion-icon" aria-hidden="true">&#9660;</span>
            </button>`;
            html += `<div class="va-review-accordion-body" id="${accId}">`;

            // Show fields in this section as review rows (populated from formData)
            if (s.rows) {
                html += '<dl>';
                for (const row of s.rows) {
                    for (const col of row.columns) {
                        const fieldDef = props[col.fieldId];
                        const vaField = fieldDef?.['x-va-field'] || {};
                        const label = vaField.label || humanize(col.fieldId);
                        const widget = vaField.widget || guessWidget(col.fieldId, fieldDef || {});
                        let displayVal = '—';

                        if (widget === 'address' && fieldDef?.properties) {
                            // Compose address from sub-fields
                            const parts = [];
                            const street = formData[col.fieldId + '.street'] || '';
                            const street2 = formData[col.fieldId + '.street2'] || '';
                            const city = formData[col.fieldId + '.city'] || '';
                            const state = formData[col.fieldId + '.state'] || '';
                            const zip = formData[col.fieldId + '.zipCode'] || '';
                            if (street) parts.push(street);
                            if (street2) parts.push(street2);
                            if (city || state || zip) parts.push([city, state].filter(Boolean).join(', ') + (zip ? ' ' + zip : ''));
                            displayVal = parts.length ? esc(parts.join(', ')) : '—';
                        } else if (widget === 'checkbox') {
                            displayVal = formData[col.fieldId] ? 'Yes' : 'No';
                        } else if (widget === 'radio' || widget === 'select') {
                            const raw = formData[col.fieldId] || '';
                            // Try to find the label for the selected value
                            const opts = vaField.options || fieldDef?.enum || [];
                            const match = opts.find(o => (typeof o === 'object' ? o.value : o) === raw);
                            displayVal = match ? esc(typeof match === 'object' ? match.label : match) : (raw ? esc(raw) : '—');
                        } else {
                            const raw = formData[col.fieldId] || '';
                            displayVal = raw ? esc(raw) : '—';
                        }

                        html += `<div class="va-review-row">
                            <dt>${esc(label)}</dt>
                            <dd>${displayVal}</dd>
                        </div>`;
                    }
                }
                html += '</dl>';
            }

            html += `<div style="text-align:right;margin-top:0.75rem;">
                <button class="va-review-edit-link" onclick="navigateToStep(${stepIdx})">Edit ${esc(s.title)}</button>
            </div>`;
            html += '</div></div>';
        }
    }

    // Privacy agreement checkbox (BIO pattern)
    html += `<div class="va-privacy-agreement">
        <label>
            <input type="checkbox" id="privacyAgreement" required aria-required="true">
            I have read and accept the <a href="https://www.va.gov/privacy-policy/" target="_blank">privacy policy</a>.
            <strong>Note:</strong> According to the Paperwork Reduction Act, you are not required to respond to a collection
            of information unless it displays a currently valid OMB control number.
        </label>
    </div>`;

    html += '</div>';
    return html;
}

function toggleAccordion(id, btn) {
    const body = document.getElementById(id);
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open');
    btn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
}

// ─── Save current form field values into formData ───
function saveFormValues() {
    const form = document.getElementById('vaForm');
    if (!form) return;
    form.querySelectorAll('input, select, textarea').forEach(el => {
        if (!el.name) return;
        if (el.type === 'radio') {
            if (el.checked) formData[el.name] = el.value;
        } else if (el.type === 'checkbox') {
            formData[el.name] = el.checked;
        } else {
            formData[el.name] = el.value;
        }
    });
}

// ─── Restore saved values into rendered form fields ───
function restoreFormValues() {
    const form = document.getElementById('vaForm');
    if (!form) return;
    form.querySelectorAll('input, select, textarea').forEach(el => {
        if (!el.name || !(el.name in formData)) return;
        const val = formData[el.name];
        if (el.type === 'radio') {
            el.checked = (el.value === val);
        } else if (el.type === 'checkbox') {
            el.checked = !!val;
        } else {
            el.value = val;
        }
    });
}

// ─── Validate required fields on current step, show VA-style errors ───
function validateCurrentStep() {
    const form = document.getElementById('vaForm');
    if (!form) return true;
    let valid = true;
    // Clear previous errors
    form.querySelectorAll('.va-field-error').forEach(el => el.remove());
    form.querySelectorAll('.va-input-error').forEach(el => {
        el.classList.remove('va-input-error');
        el.removeAttribute('aria-invalid');
        // Remove error from aria-describedby
        const desc = el.getAttribute('aria-describedby') || '';
        el.setAttribute('aria-describedby', desc.replace(/err_\S+\s*/g, '').trim());
        if (!el.getAttribute('aria-describedby')) el.removeAttribute('aria-describedby');
    });

    form.querySelectorAll('input[required], select[required], textarea[required]').forEach(el => {
        const isEmpty = el.type === 'checkbox' ? !el.checked :
                        el.type === 'radio' ? !form.querySelector(`input[name="${el.name}"]:checked`) :
                        !el.value.trim();
        if (isEmpty) {
            valid = false;
            el.classList.add('va-input-error');
            el.setAttribute('aria-invalid', 'true');
            // Find label text
            const fieldContainer = el.closest('.va-field') || el.closest('fieldset');
            const labelEl = fieldContainer?.querySelector('label, legend');
            const labelText = labelEl ? labelEl.textContent.replace(/\(\*Required\)/g, '').trim() : 'This field';
            // Create error message
            const errId = 'err_' + (el.name || el.id);
            const errDiv = document.createElement('div');
            errDiv.className = 'va-field-error';
            errDiv.id = errId;
            errDiv.setAttribute('role', 'alert');
            errDiv.textContent = labelText + ' is required';
            // Insert before the input
            el.parentNode.insertBefore(errDiv, el);
            // Link via aria-describedby
            const existing = el.getAttribute('aria-describedby') || '';
            el.setAttribute('aria-describedby', (errId + ' ' + existing).trim());
        }
    });

    if (!valid) {
        // Focus the first error field
        const firstErr = form.querySelector('.va-input-error');
        if (firstErr) firstErr.focus();
    }
    return valid;
}

function navigateStep(delta) {
    const steps = getFormSteps(currentSchema);
    // Validate before moving forward (not when going back)
    if (delta > 0 && steps[currentStep]?.type !== 'intro') {
        saveFormValues();
        if (!validateCurrentStep()) return;
    } else {
        saveFormValues();
    }
    const newStep = currentStep + delta;
    if (newStep >= 0 && newStep < steps.length) {
        currentStep = newStep;
        renderVAForm(currentSchema, currentOrg);
    }
}

function navigateToStep(stepIndex) {
    saveFormValues();
    currentStep = stepIndex;
    renderVAForm(currentSchema, currentOrg);
}

// ─── Render a single field ───
// Track signature field count per render pass for progressive labeling
let _sigFieldCounter = 0;
function resetSigCounter() { _sigFieldCounter = 0; }
const _sigLabels = ["Veteran's Signature", "Witness/Representative Signature", "Provider Signature"];

function renderVAField(fieldId, def, vaField, isRequired) {
    if (!def) return '';
    let label = (vaField.label ? stripPdfMetadata(vaField.label) : '') || humanize(fieldId);
    // Repair Spanish diacritics stripped during PDF extraction
    label = repairSpanishDiacritics(label);
    let widget = vaField.widget || guessWidget(fieldId, def);
    // Override widget for signature fields that were mis-typed as "text" in the schema
    if (widget === 'text' && /^signature/i.test(fieldId) && !/design|assign/i.test(fieldId)) widget = 'signature';
    // Override widget for date fields that were mis-typed as "text" in the schema
    if (widget === 'text' && /(?:^date|date$|dateOf|dateSigned|dateFrom|dateThru|dateTo|effectiveDate|expirationDate|birthDate)/i.test(fieldId)
        && !/update|candidate|mandate/i.test(fieldId)) widget = 'date';
    // Override widget for SSN fields mis-typed as "text"
    if (widget === 'text' && /ssn|socialSecurity/i.test(fieldId)) widget = 'ssn';
    // Override widget for phone fields mis-typed as "text"
    if (widget === 'text' && /phone|telephone|fax/i.test(fieldId)) widget = 'phone';
    // Override widget for email fields mis-typed as "text"
    if (widget === 'text' && /email|emailAddress/i.test(fieldId) && def.type === 'string') widget = 'email';
    // Override widget for checkbox fields mis-typed as "text" — "radioisotopesYes", "check1", etc.
    if (widget === 'text') {
        const _kl = fieldId.toLowerCase();
        if (/yes$/i.test(fieldId) && !/address/i.test(fieldId)) widget = 'checkbox';
        else if (/no$/i.test(fieldId) && !/securityno|claimno|accountno|stationno|fileno|wardno|loano|insuranceno|transferno|phoneno|sono|pono|prno|cbno|socksize/i.test(_kl)) widget = 'checkbox';
        else if (/^check\d*$/i.test(fieldId) || /checkbox\d*$/i.test(fieldId)) widget = 'checkbox';
        else if (/indicator$/i.test(fieldId)) widget = 'checkbox';
    }
    // Override for enum fields that got widget:"text" — should render as select
    if (widget === 'text' && def.enum && def.enum.length > 0) widget = 'select';
    // Clean up checkbox labels — strip redundant trailing "Yes"/"No" and add "?" for question phrasing
    if (widget === 'checkbox') {
        label = label.replace(/\s+(Yes|No)\s*$/i, '').replace(/\s*\?\s*$/, '');
        // If label reads like a question (starts with verb/contains question words), add "?"
        if (/^(Do|Does|Did|Is|Are|Was|Were|Have|Has|Had|Can|Will|Should)\b/i.test(label)) label += '?';
    }
    // Improve generic "Signature Field" labels with contextual names
    if (widget === 'signature' && /^signature\s*field/i.test(label)) {
        label = _sigLabels[_sigFieldCounter] || ('Signature ' + (_sigFieldCounter + 1));
        _sigFieldCounter++;
    }
    const reqMark = isRequired ? '<span class="required-mark">(*Required)</span>' : '';
    const hintId = vaField.note ? 'hint_' + fieldId : '';
    const hintHtml = vaField.note ? '<div class="va-field-hint" id="' + hintId + '">' + esc(vaField.note) + '</div>' : '';
    const hintAttr = hintId ? ' aria-describedby="' + hintId + '"' : '';

    switch (widget) {
        case 'ssn':
            return `<div class="va-field">
                <label for="f_${fieldId}">${esc(label)} ${reqMark}</label>
                <div class="va-field-hint" id="hint_${fieldId}">Format: XXX-XX-XXXX</div>
                <input type="text" id="f_${fieldId}" name="${fieldId}" placeholder="000-00-0000" maxlength="11" pattern="\\d{3}-?\\d{2}-?\\d{4}" aria-describedby="hint_${fieldId}" ${isRequired ? 'required aria-required="true"' : ''}>
            </div>`;

        case 'date':
            return `<div class="va-field">
                <label for="f_${fieldId}">${esc(label)} ${reqMark}</label>
                ${hintHtml}
                <input type="date" id="f_${fieldId}" name="${fieldId}"${hintAttr} ${isRequired ? 'required aria-required="true"' : ''}>
            </div>`;

        case 'email':
            return `<div class="va-field">
                <label for="f_${fieldId}">${esc(label)} ${reqMark}</label>
                <input type="email" id="f_${fieldId}" name="${fieldId}" placeholder="email@example.com" ${isRequired ? 'required aria-required="true"' : ''}>
            </div>`;

        case 'phone':
            return `<div class="va-field">
                <label for="f_${fieldId}">${esc(label)} ${reqMark}</label>
                <input type="tel" id="f_${fieldId}" name="${fieldId}" placeholder="(555) 555-5555" ${isRequired ? 'required aria-required="true"' : ''}>
            </div>`;

        case 'select':
            const opts = (vaField.options || def.enum || []).map(o => {
                const val = typeof o === 'object' ? o.value : o;
                const lbl = typeof o === 'object' ? o.label : o;
                return `<option value="${val}">${esc(lbl)}</option>`;
            }).join('');
            return `<div class="va-field">
                <label for="f_${fieldId}">${esc(label)} ${reqMark}</label>
                ${hintHtml}
                <select id="f_${fieldId}" name="${fieldId}"${hintAttr} ${isRequired ? 'required aria-required="true"' : ''}>
                    <option value="" disabled selected>- Select -</option>${opts}
                </select>
            </div>`;

        case 'radio':
            const radioOpts = (vaField.options || []).map((o, i) => {
                const val = typeof o === 'object' ? o.value : o;
                const lbl = typeof o === 'object' ? o.label : o;
                return `<div class="va-radio-item">
                    <input type="radio" id="f_${fieldId}_${i}" name="${fieldId}" value="${val}">
                    <label for="f_${fieldId}_${i}">${esc(lbl)}</label>
                </div>`;
            }).join('');
            return `<fieldset class="va-field">
                <legend class="va-field-label">${esc(label)} ${reqMark}</legend>
                ${hintHtml}
                <div class="va-radio-group">${radioOpts}</div>
            </fieldset>`;

        case 'checkbox':
            return `<div class="va-field">
                <div class="va-checkbox-group">
                    <div class="va-checkbox-item">
                        <input type="checkbox" id="f_${fieldId}" name="${fieldId}" ${isRequired ? 'required aria-required="true"' : ''}>
                        <label for="f_${fieldId}">${esc(label)}</label>
                    </div>
                </div>
            </div>`;

        case 'address':
            const subProps = def.properties || {};
            const subReq = new Set(def.required || []);
            const hasName = subProps.name !== undefined;
            return `<fieldset class="va-field">
                <legend class="va-field-label">${esc(label)} ${reqMark}</legend>
                ${hintHtml}
                <div class="va-address-grid">
                    ${hasName ? '<div class="va-field" style="margin-bottom:0.5rem;"><label for="f_' + fieldId + '_name">Name ' + (subReq.has('name') ? '<span class="required-mark">(*Required)</span>' : '') + '</label><input type="text" id="f_' + fieldId + '_name" name="' + fieldId + '.name" ' + (subReq.has('name') ? 'required' : '') + '></div>' : ''}
                    <div class="va-field" style="margin-bottom:0.5rem;">
                        <label for="f_${fieldId}_street">Street address ${subReq.has('street') ? '<span class="required-mark">(*Required)</span>' : ''}</label>
                        <input type="text" id="f_${fieldId}_street" name="${fieldId}.street" ${subReq.has('street') ? 'required' : ''}>
                    </div>
                    <div class="va-field" style="margin-bottom:0.5rem;">
                        <label for="f_${fieldId}_street2">Street address line 2</label>
                        <input type="text" id="f_${fieldId}_street2" name="${fieldId}.street2">
                    </div>
                    <div class="va-address-row">
                        <div class="va-field">
                            <label for="f_${fieldId}_city">City ${subReq.has('city') ? '<span class="required-mark">(*Required)</span>' : ''}</label>
                            <input type="text" id="f_${fieldId}_city" name="${fieldId}.city" ${subReq.has('city') ? 'required' : ''}>
                        </div>
                        <div class="va-field narrow">
                            <label for="f_${fieldId}_state">State ${subReq.has('state') ? '<span class="required-mark">(*Required)</span>' : ''}</label>
                            <select id="f_${fieldId}_state" name="${fieldId}.state" ${subReq.has('state') ? 'required' : ''}>
                                <option value="">--</option>
                                ${US_STATES.map(s => '<option>' + s + '</option>').join('')}
                            </select>
                        </div>
                        <div class="va-field zip">
                            <label for="f_${fieldId}_zip">ZIP code ${subReq.has('zipCode') ? '<span class="required-mark">(*Required)</span>' : ''}</label>
                            <input type="text" id="f_${fieldId}_zip" name="${fieldId}.zipCode" maxlength="10" ${subReq.has('zipCode') ? 'required' : ''}>
                        </div>
                    </div>
                </div>
            </fieldset>`;

        case 'fullname':
            return `<fieldset class="va-field">
                <legend class="va-field-label">${esc(label)} ${reqMark}</legend>
                <div class="va-address-row" style="gap:0.75rem;">
                    <div class="va-field" style="flex:2;">
                        <label for="f_${fieldId}_first">First name</label>
                        <input type="text" id="f_${fieldId}_first" name="${fieldId}.first" ${isRequired ? 'required' : ''}>
                    </div>
                    <div class="va-field" style="flex:0.5;">
                        <label for="f_${fieldId}_middle">Middle</label>
                        <input type="text" id="f_${fieldId}_middle" name="${fieldId}.middle" maxlength="1">
                    </div>
                    <div class="va-field" style="flex:2;">
                        <label for="f_${fieldId}_last">Last name</label>
                        <input type="text" id="f_${fieldId}_last" name="${fieldId}.last" ${isRequired ? 'required' : ''}>
                    </div>
                </div>
            </fieldset>`;

        case 'signature':
            return `<div class="va-field">
                <label for="f_${fieldId}">${esc(label)} ${reqMark}</label>
                <div class="va-signature-block" style="border:2px solid var(--vads-color-base-dark);background:var(--vads-color-base-lightest);padding:1rem;margin-top:0.25rem;">
                    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">
                        <span style="font-size:1.5rem;color:var(--vads-color-base);">&#x270D;</span>
                        <span style="font-size:0.85rem;color:var(--vads-color-base);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Sign here</span>
                    </div>
                    <input type="text" id="f_${fieldId}" name="${fieldId}" placeholder="Type your full legal name" style="border:none;border-bottom:2px solid var(--vads-color-base-dark);background:none;font-size:1.1rem;font-family:'Brush Script MT',cursive,var(--vads-font-sans);color:var(--vads-color-base);width:100%;padding:0.35rem 0;outline:none;" ${isRequired ? 'required aria-required="true"' : ''}>
                    <div style="font-size:0.75rem;color:var(--vads-color-base);margin-top:0.5rem;">By signing, I certify that the information I have provided is true and correct to the best of my knowledge.</div>
                </div>
            </div>`;

        case 'zip':
            return `<div class="va-field">
                <label for="f_${fieldId}">${esc(label)} ${reqMark}</label>
                ${hintHtml}
                <input type="text" id="f_${fieldId}" name="${fieldId}" placeholder="00000" maxlength="10" inputmode="numeric"${hintAttr} ${isRequired ? 'required aria-required="true"' : ''}>
            </div>`;

        case 'textarea':
            return `<div class="va-field">
                <label for="f_${fieldId}">${esc(label)} ${reqMark}</label>
                ${hintHtml}
                <textarea id="f_${fieldId}" name="${fieldId}" rows="3"${hintAttr} ${isRequired ? 'required aria-required="true"' : ''}></textarea>
            </div>`;

        default: // text
            return `<div class="va-field">
                <label for="f_${fieldId}">${esc(label)} ${reqMark}</label>
                ${hintHtml}
                <input type="text" id="f_${fieldId}" name="${fieldId}"${hintAttr} ${def.maxLength ? 'maxlength="' + def.maxLength + '"' : ''} ${isRequired ? 'required aria-required="true"' : ''}>
            </div>`;
    }
}

function guessWidget(key, def) {
    // Date format check first — fields with format:"date" are always date pickers
    if (def.format === 'date') return 'date';
    // Detect date fields by ID even when schema lacks format:"date" (844 fields affected)
    // Match: dateOfBirth, effectiveDate, dateSigned, dateFrom, expirationDate, etc.
    // Exclude: "update", "candidate", "mandate" where "date" is a substring of another word
    if (def.type === 'string' && /(?:^date|date$|dateOf|dateSigned|dateFrom|dateThru|dateTo|effectiveDate|expirationDate|birthDate)/i.test(key)
        && !/update|candidate|mandate/i.test(key)) return 'date';
    // Signature check — signature fields are often typed as boolean but should render as signature pad
    // Exclude false positives: signif*, signal, design, assign, and "dateSigned" / "Signed" alone
    if (/signature/i.test(key) && !/design|assign/i.test(key)) return 'signature';
    if (/\bsign(?:ed)?\b/i.test(key) && !/signif|signal|design|assign|date.*sign/i.test(key)) return 'signature';
    if (def.type === 'boolean') return 'checkbox';
    // Detect checkbox fields by ID pattern — "radioisotopesYes", "humanSubjectsNo", "check1"
    // Exclude false positives: "No" meaning "Number" (socialSecurityNo, claimNo, accountNo, stationNo, fileNo, wardNo)
    if (def.type === 'string') {
        const kl = key.toLowerCase();
        if (/yes$/i.test(key) && !/address/i.test(key)) return 'checkbox';
        if (/no$/i.test(key) && !/securityno|claimno|accountno|stationno|fileno|wardno|loano|insuranceno|transferno|phoneno|sono|pono|prno|cbno|socksize/i.test(kl)) return 'checkbox';
        if (/^check\d*$/i.test(key) || /checkbox\d*$/i.test(key)) return 'checkbox';
        if (/indicator$/i.test(key)) return 'checkbox';
    }
    if (def.type === 'object' && def.properties) {
        if (def.properties.street || def.properties.city || def.properties.postalCode) return 'address';
        if (def.properties.first && def.properties.last) return 'fullname';
        return 'text';
    }
    if (def.enum && def.enum.length > 0) return 'select';
    if (def.format === 'email') return 'email';
    // Detect email fields by ID even when schema lacks format:"email"
    if (/email|emailAddress/i.test(key) && def.type === 'string') return 'email';
    if (/ssn|socialSecurity/i.test(key)) return 'ssn';
    if (/phone|telephone|fax/i.test(key)) return 'phone';
    // Detect zip/postal code fields — render with maxlength
    if (/^zip|zipCode|postalCode/i.test(key) && def.type === 'string') return 'zip';
    if (/remark|comment|explanation|narrative|describe|diagnosis|reason|additional.*info/i.test(key)) return 'textarea';
    return 'text';
}

function stripPdfMetadata(s) {
    return s
         // PDF form instructions
         .replace(/\s*This Is (?:A\s*Read|Aread)\s*Only Field\b/gi, '')
         .replace(/\s*That Auto\s*populated From Page\s*\d*/gi, '')
         .replace(/\s*Do Not Write In This Space/gi, '')
         .replace(/\s*For VA Use Only/gi, '')
         .replace(/\s*This is A?read Only Field\b/gi, '')
         .replace(/\s*\(?\s*Read Only\s*\)?\s*/gi, ' ')
         // Page/section references
         .replace(/\s+Page\s*\d+$/i, '')
         .replace(/\s*Section\s+\d+\s*(?:Of\s*\d+)?/gi, '')
         .replace(/\s*Item\s+\d+[A-Z]?\b/gi, '')
         // Signature junk
         .replace(/\s*\d+Date Signed\b[^)"]*/gi, '')
         // Cross-references
         .replace(/\s*From Question\s*\d+\s*/gi, ' ')
         .replace(/\s*See (?:Item|Block|Instructions?|Page)\s*\d*\s*/gi, '')
         // Numbered prefixes: "12A.", "3.", "8B."
         .replace(/^\d+[A-Z]?\.\s*/i, '')
         // Form fill instructions
         .replace(/\s*(?:Check|Mark)\s+(?:One|All|Box|Appropriate)\b[^,;]*/gi, '')
         .replace(/\s*If (?:Applicable|Yes|No|Known|Available)\b/gi, '')
         .replace(/\s*Print Clearly\b/gi, '')
         .replace(/\s*(?:Use Ink|Type Or Print)\b/gi, '')
         // OMB/Privacy legalese
         .replace(/\s*(?:Privacy Act|Paperwork Reduction|Public Reporting|Penalty Statement)\b[^,;]*/gi, '')
         .replace(/\s*OMB\s*(?:Approval|Control|No\.?|Number)\s*[\d-]*/gi, '')
         .replace(/\s*Respondent(?:s|'s)?\s*Burden\b[^,;]*/gi, '')
         // Trailing parenthetical fragments
         .replace(/\s*\(\s*$/g, '')
         // "Mm Dd Yyyy" date format hints in labels
         .replace(/\s*Mm\s*Dd?\s*Yyyy\b/gi, '')
         .replace(/\s*Mm\s*\/?\s*Dd\s*\/?\s*Yy(?:yy)?\b/gi, '')
         // "Click Here To Select" (from digital PDFs)
         .replace(/Click Here To Select\s*/gi, '')
         // Clean up
         .replace(/\s+/g, ' ').trim();
}

// ─── Spanish diacritics repair — fix accent-stripped words from PDF extraction ───
const _spanishFixes = {
    'direccin': 'Dirección', 'cdigo': 'Código', 'cdigoposta': 'Código Postal',
    'mdico': 'Médico', 'nmero': 'Número', 'telfono': 'Teléfono',
    'organizacin': 'Organización', 'posicin': 'Posición', 'pgina': 'Página',
    'atencin': 'Atención', 'admisinjn': 'Admisión', 'terminacin': 'Terminación',
    'prrafo': 'Párrafo', 'cnyuge': 'Cónyuge', 'telefnicos': 'Telefónicos',
    'provedo': 'Proveído', 'instruccione': 'Instrucciones',
    'mdicos': 'Médicos', 'nmeros': 'Números',
};
function repairSpanishDiacritics(s) {
    let result = s;
    for (const [broken, fixed] of Object.entries(_spanishFixes)) {
        const re = new RegExp(broken, 'gi');
        result = result.replace(re, (m) => {
            // Preserve original case pattern
            if (m === m.toUpperCase()) return fixed.toUpperCase();
            if (m[0] === m[0].toUpperCase()) return fixed;
            return fixed.toLowerCase();
        });
    }
    return result;
}

function humanize(str) {
    // Handle very short/numeric field IDs — use them as-is with "Field" prefix
    if (/^\d+[a-z]?$/i.test(str) && str.length <= 3) return 'Field ' + str.toUpperCase();
    if (str.length <= 2) return 'Field ' + str.toUpperCase();
    // Strip trailing digits before camelCase split (e.g., buildingPaper2 → buildingPaper)
    let s = str.replace(/\d+$/, '');
    s = s.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/[_-]/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase())
        .replace(/\bSsn\b/g, 'SSN').replace(/\bDob\b/g, 'Date of Birth')
        .replace(/\bVa\b/g, 'VA').replace(/\bId\b/g, 'ID')
        .replace(/\bDod\b/g, 'DOD').replace(/\bPow\b/g, 'POW')
        .replace(/\bUsmc\b/g, 'USMC').replace(/\bDob\b/g, 'DOB');
    s = stripPdfMetadata(s);
    s = repairSpanishDiacritics(s);
    // Truncate very long labels to ~65 chars at a word boundary
    if (s.length > 70) {
        s = s.substring(0, 65).replace(/\s+\S*$/, '') + '…';
    }
    return s;
}

function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─── Export / Clear ───
function exportFormData() {
    // Validate privacy agreement
    const privacyCb = document.getElementById('privacyAgreement');
    if (privacyCb && !privacyCb.checked) {
        // Show error on privacy checkbox
        const container = privacyCb.closest('.va-privacy-agreement');
        if (container && !container.querySelector('.va-field-error')) {
            const errDiv = document.createElement('div');
            errDiv.id = 'privacyError';
            errDiv.className = 'va-field-error';
            errDiv.setAttribute('role', 'alert');
            errDiv.textContent = 'You must accept the privacy policy to submit';
            container.prepend(errDiv);
        }
        privacyCb.setAttribute('aria-describedby', 'privacyError');
        privacyCb.setAttribute('aria-invalid', 'true');
        privacyCb.focus();
        return;
    }

    if (!confirm('Download your form data as JSON?')) return;

    // Build structured export data from formData model
    const data = {};
    for (const [key, val] of Object.entries(formData)) {
        if (val === '' || val === false || val === null) continue;
        const parts = key.split('.');
        if (parts.length === 2) {
            if (!data[parts[0]]) data[parts[0]] = {};
            data[parts[0]][parts[1]] = val;
        } else {
            data[key] = val;
        }
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (currentSchema?.title || 'form') + '-data.json';
    a.click();
    URL.revokeObjectURL(url);
}

// ─── Search ───
document.getElementById('searchBox').addEventListener('input', function(e) {
    const q = e.target.value.trim();
    if (q.length < 2) { if (currentOrg) renderFormList(currentOrg); return; }
    const listEl = document.getElementById('formList');
    let allMatches = [];
    for (const org of ORGS) {
        const data = allFormsByOrg[org.id];
        if (!data) continue;
        const forms = (data.index.forms || []).filter(f => f.name.toLowerCase().includes(q.toLowerCase()));
        allMatches.push(...forms.map(f => ({ ...f, orgId: org.id, orgLabel: org.label })));
    }
    if (!allMatches.length) { listEl.innerHTML = '<div style="padding:2rem;text-align:center;color:#a9aeb1;font-size:0.82rem;">No forms match "' + q + '"</div>'; return; }
    listEl.innerHTML = allMatches.slice(0, 60).map(f => {
        const safeName = (f.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        const status = f.status || 'unknown';
        const isBio = status === 'bio-reference';
        const badgeClass = isBio ? 'badge-bio' : (status === 'digitized' ? 'badge-digitized' : 'badge-flat');
        const badgeLabel = isBio ? 'BIO (for reference)' : (status === 'digitized' ? 'Digitized' : 'Flat');
        return `<div class="form-item" data-file="${f.fileName}" onclick="selectForm('${f.orgId}','${f.fileName}','${safeName}')">
            <div class="form-item-info"><div class="form-item-name">${f.name}</div><div class="form-item-meta">${f.orgLabel} · ${f.totalFields || 0} fields</div></div>
            <div class="form-item-badges"><span class="badge ${badgeClass}">${badgeLabel}</span></div>
        </div>`;
    }).join('');
});
