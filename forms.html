<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquia Form Builder — VA Forms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --midnight: #030940;
            --royal: #050F69;
            --azure: #2071C6;
            --sky: #68B4E7;
            --silver: #CECBD2;
            --ice: #E7F1FB;
            --offwhite: #FAFAFA;
            --white: #FFFFFF;
            --orange: #CC5800;
            --crimson: #E11A0C;
            --gold: #FFC107;
            --amethyst: #7751A8;
            --dark-gray: #4A4A5A;
            --success: #1a8a3e;
        }
        body {
            font-family: 'Poppins', sans-serif;
            color: var(--dark-gray);
            background: var(--offwhite);
            line-height: 1.6;
            overflow: hidden;
        }

        /* ─── Header ─── */
        .header {
            background: linear-gradient(135deg, var(--midnight) 0%, var(--royal) 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 100;
            height: 52px;
        }
        .header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.3px; }
        .header p { font-size: 0.7rem; opacity: 0.7; font-weight: 300; }
        .header-right { margin-left: auto; display: flex; gap: 0.75rem; align-items: center; }
        .header-right a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.78rem;
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .header-right a:hover { background: rgba(255,255,255,0.1); color: white; }
        .search-box {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 0.4rem 0.85rem;
            color: white;
            font-family: inherit;
            font-size: 0.78rem;
            width: 240px;
            outline: none;
            transition: all 0.2s;
        }
        .search-box::placeholder { color: rgba(255,255,255,0.5); }
        .search-box:focus { background: rgba(255,255,255,0.18); border-color: var(--sky); }

        /* ─── Layout ─── */
        .layout { display: flex; height: calc(100vh - 52px); }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 300px;
            min-width: 300px;
            border-right: 1px solid var(--silver);
            background: var(--white);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .org-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            border-bottom: 1px solid var(--silver);
            background: var(--ice);
        }
        .org-tab {
            flex: 1;
            min-width: 50%;
            padding: 0.5rem 0.4rem;
            text-align: center;
            font-size: 0.68rem;
            font-weight: 500;
            color: var(--dark-gray);
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            background: none;
            border-top: none; border-left: none; border-right: none;
            font-family: inherit;
        }
        .org-tab:hover { background: rgba(32,113,198,0.06); }
        .org-tab.active {
            color: var(--azure);
            border-bottom-color: var(--azure);
            background: var(--white);
            font-weight: 600;
        }
        .org-tab .count {
            display: inline-block;
            background: var(--silver);
            color: var(--dark-gray);
            font-size: 0.58rem;
            padding: 0.08rem 0.35rem;
            border-radius: 10px;
            margin-left: 0.2rem;
            font-weight: 400;
        }
        .org-tab.active .count { background: var(--azure); color: white; }

        .form-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        .form-item {
            padding: 0.55rem 0.85rem;
            border-bottom: 1px solid #f0f0f4;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .form-item:hover { background: var(--ice); }
        .form-item.active { background: #d6e8f8; border-left: 3px solid var(--azure); }
        .form-item-info { flex: 1; min-width: 0; }
        .form-item-name {
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--midnight);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .form-item-meta {
            font-size: 0.62rem;
            color: #888;
            margin-top: 0.05rem;
        }
        .form-item-badges {
            display: flex;
            flex-direction: column;
            gap: 2px;
            align-items: flex-end;
        }
        .form-item-badge {
            font-size: 0.58rem;
            padding: 0.12rem 0.35rem;
            border-radius: 4px;
            font-weight: 500;
            white-space: nowrap;
        }
        .badge-digitized { background: #e6f4ea; color: var(--success); }
        .badge-flat { background: #fef3e0; color: var(--orange); }
        .badge-routing { background: #f3e8ff; color: var(--amethyst); }

        /* ─── Main Content ─── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #525659;
        }

        /* ─── PDF Toolbar ─── */
        .pdf-toolbar {
            background: var(--white);
            border-bottom: 1px solid var(--silver);
            padding: 0.65rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            min-height: 50px;
        }
        .pdf-toolbar-info { flex: 1; min-width: 0; }
        .pdf-toolbar-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--midnight);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pdf-toolbar-meta {
            font-size: 0.68rem;
            color: #888;
            margin-top: 0.1rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .pdf-toolbar-meta b { color: var(--dark-gray); font-weight: 500; }
        .pdf-toolbar-actions {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
        }
        .btn {
            font-family: inherit;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 0.4rem 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--azure) 0%, var(--royal) 100%);
            color: white;
        }
        .btn-primary:hover { box-shadow: 0 3px 10px rgba(32,113,198,0.3); transform: translateY(-1px); }
        .btn-secondary {
            background: var(--white);
            color: var(--dark-gray);
            border: 1px solid var(--silver);
        }
        .btn-secondary:hover { background: var(--ice); }
        .btn-icon {
            background: none;
            border: 1px solid var(--silver);
            color: var(--dark-gray);
            width: 34px;
            height: 34px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-icon:hover { background: var(--ice); border-color: var(--azure); color: var(--azure); }
        .btn-icon svg { width: 16px; height: 16px; }

        /* ─── PDF Viewer ─── */
        .pdf-viewer {
            flex: 1;
            position: relative;
            background: #525659;
        }
        .pdf-viewer iframe,
        .pdf-viewer object,
        .pdf-viewer embed {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ─── Empty State ─── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--silver);
            text-align: center;
            padding: 2rem;
            background: var(--offwhite);
        }
        .empty-state svg { width: 72px; height: 72px; margin-bottom: 1rem; opacity: 0.35; }
        .empty-state h2 { font-size: 1rem; color: #999; font-weight: 500; }
        .empty-state p { font-size: 0.78rem; color: #bbb; margin-top: 0.25rem; max-width: 360px; }

        /* ─── Loading ─── */
        .loading { text-align: center; padding: 2.5rem; color: #999; }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid var(--silver);
            border-top-color: var(--azure);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 0.6rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Fallback overlay when PDF can't embed ─── */
        .pdf-fallback {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: var(--offwhite);
            padding: 2rem;
            text-align: center;
        }
        .pdf-fallback svg { width: 64px; height: 64px; color: var(--azure); margin-bottom: 1rem; }
        .pdf-fallback h3 { font-size: 1rem; color: var(--midnight); margin-bottom: 0.5rem; }
        .pdf-fallback p { font-size: 0.82rem; color: #888; margin-bottom: 1.25rem; max-width: 420px; }
        .pdf-fallback .btn { font-size: 0.85rem; padding: 0.6rem 1.5rem; }

        /* ─── Schema panel (slide-out) ─── */
        .schema-panel {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 380px;
            background: var(--white);
            border-left: 1px solid var(--silver);
            box-shadow: -4px 0 20px rgba(0,0,0,0.08);
            z-index: 50;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .schema-panel.open { display: flex; }
        .schema-panel-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--ice);
        }
        .schema-panel-header h3 { font-size: 0.82rem; font-weight: 600; color: var(--midnight); }
        .schema-panel-close {
            background: none; border: none; cursor: pointer;
            color: #888; font-size: 1.2rem; line-height: 1;
            padding: 0.2rem;
        }
        .schema-panel-close:hover { color: var(--midnight); }
        .schema-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .schema-section {
            margin-bottom: 1rem;
        }
        .schema-section-title {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--azure);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid #f0f0f4;
        }
        .schema-field {
            padding: 0.3rem 0;
            font-size: 0.72rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .schema-field-name { color: var(--midnight); font-weight: 500; }
        .schema-field-type {
            font-size: 0.62rem;
            background: var(--ice);
            color: var(--azure);
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
        }
        .schema-field-label {
            display: block;
            font-size: 0.62rem;
            color: #999;
            margin-top: 0.05rem;
        }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .sidebar { width: 100%; min-width: unset; max-height: 35vh; }
            .layout { flex-direction: column; }
            .schema-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Aquia Form Builder</h1>
            <p>VA Form Library — 541 digitized forms</p>
        </div>
        <div class="header-right">
            <input type="text" class="search-box" id="searchBox" placeholder="Search forms...">
            <a href="index.html">Digitizer</a>
            <a href="report.html">Report</a>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="org-tabs" id="orgTabs"></div>
            <div class="form-list" id="formList">
                <div class="loading"><div class="spinner"></div>Loading forms...</div>
            </div>
        </div>
        <div class="main" id="mainPanel">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <h2>Select a form to get started</h2>
                <p>Choose a form from the sidebar to view the full PDF with fillable fields</p>
            </div>
        </div>
    </div>

<script>
const SCHEMA_BASE = 'schemas';

const ORGS = [
    { id: 'vba', label: 'VBA', dir: 'vba', fullName: 'Veterans Benefits Administration' },
    { id: 'vha', label: 'VHA', dir: 'va/vha', fullName: 'Veterans Health Administration' },
    { id: 'nca', label: 'NCA', dir: 'va/nca', fullName: 'National Cemetery Administration' },
    { id: 'facilities', label: 'Facilities', dir: 'va/facilities', fullName: 'Facilities & Logistics' },
    { id: 'admin', label: 'Admin', dir: 'va/admin', fullName: 'VA Administration' },
    { id: 'other', label: 'Other', dir: 'va/other', fullName: 'Standard Forms & Other' }
];

let currentOrg = null;
let currentFormMeta = null;
let currentSchema = null;
let allFormsByOrg = {};

// ─── Load org index ───
async function loadOrgIndex(org) {
    const url = `${SCHEMA_BASE}/${org.dir}/index.json?cb=${Date.now()}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Failed to load ' + url);
    return resp.json();
}

// ─── Load individual schema ───
async function loadSchema(org, fileName) {
    const url = `${SCHEMA_BASE}/${org.dir}/${fileName}?cb=${Date.now()}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Failed to load schema');
    return resp.json();
}

// ─── Initialize tabs ───
async function initTabs() {
    const tabs = document.getElementById('orgTabs');
    for (const org of ORGS) {
        const btn = document.createElement('button');
        btn.className = 'org-tab';
        btn.dataset.orgId = org.id;
        btn.innerHTML = `${org.label} <span class="count">...</span>`;
        btn.onclick = () => selectOrg(org);
        tabs.appendChild(btn);
    }

    const results = await Promise.allSettled(ORGS.map(async org => {
        const idx = await loadOrgIndex(org);
        allFormsByOrg[org.id] = { org, index: idx };
        return { org, index: idx };
    }));

    for (const r of results) {
        if (r.status === 'fulfilled') {
            const { org, index } = r.value;
            const tab = tabs.querySelector(`[data-org-id="${org.id}"]`);
            const count = index.forms ? index.forms.length : (index.totalForms || 0);
            tab.querySelector('.count').textContent = count;
        }
    }

    selectOrg(ORGS[0]);
}

// ─── Select org tab ───
function selectOrg(org) {
    currentOrg = org;
    document.querySelectorAll('.org-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-org-id="${org.id}"]`).classList.add('active');
    renderFormList(org);
}

// ─── Render form list in sidebar ───
function renderFormList(org, filterText) {
    const listEl = document.getElementById('formList');
    const data = allFormsByOrg[org.id];
    if (!data) {
        listEl.innerHTML = '<div class="loading">Loading...</div>';
        return;
    }

    let forms = data.index.forms || [];
    if (filterText) {
        const q = filterText.toLowerCase();
        forms = forms.filter(f => f.name.toLowerCase().includes(q));
    }

    if (forms.length === 0) {
        listEl.innerHTML = '<div style="padding:2rem;text-align:center;color:#aaa;font-size:0.78rem;">No forms found</div>';
        return;
    }

    listEl.innerHTML = forms.map(f => {
        const status = f.status || 'unknown';
        const badgeClass = status === 'digitized' ? 'badge-digitized' : 'badge-flat';
        const fields = f.totalFields || 0;
        const coverage = f.coveragePercent || 0;
        const routing = (f.requires3rdParty === 'Yes' || (f.routingTypes && f.routingTypes.length > 0));
        const safeName = (f.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');

        return `<div class="form-item" data-form="${f.name}" data-file="${f.fileName}" onclick="selectForm('${org.id}','${f.fileName}','${safeName}')">
            <div class="form-item-info">
                <div class="form-item-name">${f.name}</div>
                <div class="form-item-meta">${fields} fields · ${coverage}% mapped${f.pageCount ? ' · ' + f.pageCount + 'pg' : ''}</div>
            </div>
            <div class="form-item-badges">
                <span class="form-item-badge ${badgeClass}">${status === 'digitized' ? 'Digitized' : 'Flat'}</span>
                ${routing ? '<span class="form-item-badge badge-routing">3rd Party</span>' : ''}
            </div>
        </div>`;
    }).join('');
}

// ─── Select and render a form ───
async function selectForm(orgId, fileName, formName) {
    // Highlight sidebar
    document.querySelectorAll('.form-item').forEach(el => el.classList.remove('active'));
    const item = document.querySelector(`.form-item[data-file="${fileName}"]`);
    if (item) item.classList.add('active');

    const org = ORGS.find(o => o.id === orgId);
    const main = document.getElementById('mainPanel');
    main.innerHTML = '<div class="loading" style="padding-top:4rem;"><div class="spinner"></div>Loading form...</div>';

    // Load schema to get metadata and PDF URL
    try {
        const schema = await loadSchema(org, fileName);
        currentSchema = schema;
        const meta = schema['x-va-metadata'] || {};
        const pdfUrl = meta.formUrl || '';

        // Find the form entry in the index for extra metadata
        const data = allFormsByOrg[orgId];
        currentFormMeta = (data?.index?.forms || []).find(f => f.fileName === fileName) || {};

        renderPdfViewer(schema, meta, pdfUrl, org);
    } catch (e) {
        main.innerHTML = `<div class="empty-state"><h2>Failed to load form</h2><p>${e.message}</p></div>`;
    }
}

// ─── Render PDF viewer ───
function renderPdfViewer(schema, meta, pdfUrl, org) {
    const main = document.getElementById('mainPanel');
    const title = schema.title || 'Untitled Form';
    const totalProps = Object.keys(schema.properties || {}).length;
    const routing = (currentFormMeta.routingTypes || []);

    let toolbarHtml = `
    <div class="pdf-toolbar">
        <div class="pdf-toolbar-info">
            <div class="pdf-toolbar-title" title="${title}">${title}</div>
            <div class="pdf-toolbar-meta">
                <span><b>${totalProps}</b> fields</span>
                <span><b>${meta.composedFields || 0}</b> mapped (${meta.coveragePercent || 0}%)</span>
                ${meta.pageCount ? '<span><b>' + meta.pageCount + '</b> pages</span>' : ''}
                <span>${org.fullName}</span>
                ${routing.length ? '<span style="color:var(--amethyst);">3rd Party: <b>' + routing.join(', ') + '</b></span>' : ''}
            </div>
        </div>
        <div class="pdf-toolbar-actions">
            <button class="btn-icon" onclick="toggleSchemaPanel()" title="View JSON Schema">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            </button>
            <button class="btn-icon" onclick="exportSchema()" title="Export JSON Schema">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            ${pdfUrl ? `<a class="btn btn-secondary" href="${pdfUrl}" target="_blank" rel="noopener">Open PDF ↗</a>` : ''}
            ${pdfUrl ? `<a class="btn btn-primary" href="${pdfUrl}" download title="Download PDF">Download</a>` : ''}
        </div>
    </div>`;

    if (!pdfUrl) {
        main.innerHTML = toolbarHtml + `
        <div class="pdf-fallback">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <h3>No PDF URL available</h3>
            <p>This form's schema was generated but the original PDF URL wasn't captured. You can still view the extracted field data using the schema panel.</p>
            <button class="btn btn-primary" onclick="toggleSchemaPanel()">View Schema Data</button>
        </div>`;
        return;
    }

    // Embed the actual PDF — browser's native viewer handles fillable fields
    main.innerHTML = toolbarHtml + `
    <div class="pdf-viewer" style="position:relative;">
        <iframe id="pdfFrame" src="${pdfUrl}" type="application/pdf" style="width:100%;height:100%;border:none;"></iframe>

        <!-- Schema slide-out panel -->
        <div class="schema-panel" id="schemaPanel">
            <div class="schema-panel-header">
                <h3>Extracted Schema — ${totalProps} fields</h3>
                <button class="schema-panel-close" onclick="toggleSchemaPanel()">✕</button>
            </div>
            <div class="schema-panel-body" id="schemaPanelBody"></div>
        </div>
    </div>`;

    // Populate schema panel content
    populateSchemaPanel(schema);

    // Handle iframe load failure — if the PDF can't embed, show fallback
    const iframe = document.getElementById('pdfFrame');
    let loadTimer = setTimeout(() => {
        // If iframe hasn't loaded in 8s, show fallback link
        showEmbedFallback(pdfUrl, title);
    }, 8000);

    iframe.onload = () => {
        clearTimeout(loadTimer);
    };

    iframe.onerror = () => {
        clearTimeout(loadTimer);
        showEmbedFallback(pdfUrl, title);
    };
}

// ─── Fallback when iframe embed fails ───
function showEmbedFallback(pdfUrl, title) {
    const viewer = document.querySelector('.pdf-viewer');
    if (!viewer) return;

    // Don't replace if PDF actually loaded
    const iframe = document.getElementById('pdfFrame');
    try {
        // Check if iframe has content (will throw if cross-origin)
        if (iframe && iframe.contentDocument && iframe.contentDocument.body && iframe.contentDocument.body.innerHTML.length > 0) return;
    } catch(e) {
        // Cross-origin — PDF probably loaded fine in the browser's PDF viewer
        return;
    }

    // Only show fallback if iframe is truly blank
    const fallback = document.createElement('div');
    fallback.className = 'pdf-fallback';
    fallback.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
        </svg>
        <h3>${title}</h3>
        <p>This PDF may not embed directly. Click below to open the full, fillable form in a new tab where you can fill it out and save/print.</p>
        <a class="btn btn-primary" href="${pdfUrl}" target="_blank" rel="noopener" style="text-decoration:none;">Open Fillable PDF ↗</a>
    `;
    // Insert fallback behind iframe, hide iframe
    iframe.style.display = 'none';
    viewer.insertBefore(fallback, viewer.firstChild);
}

// ─── Schema panel ───
function toggleSchemaPanel() {
    const panel = document.getElementById('schemaPanel');
    if (panel) panel.classList.toggle('open');
}

function populateSchemaPanel(schema) {
    const body = document.getElementById('schemaPanelBody');
    if (!body || !schema.properties) return;

    const props = schema.properties;
    const sections = categorizeForPanel(props);

    let html = '';
    for (const [sectionName, fields] of Object.entries(sections)) {
        html += `<div class="schema-section">
            <div class="schema-section-title">${sectionName}</div>`;
        for (const f of fields) {
            const typeLabel = f.def.type === 'object' ? 'object' :
                              f.def.format ? f.def.format :
                              f.def.type || 'string';
            const xfaLabel = f.def['x-xfa-label'] || '';
            html += `<div class="schema-field">
                <div>
                    <span class="schema-field-name">${humanize(f.key)}</span>
                    ${xfaLabel ? `<span class="schema-field-label">${xfaLabel}</span>` : ''}
                </div>
                <span class="schema-field-type">${typeLabel}</span>
            </div>`;
        }
        html += '</div>';
    }

    body.innerHTML = html;
}

function categorizeForPanel(props) {
    const sections = {
        'Personal': [], 'Contact': [], 'Service & Benefits': [],
        'Medical': [], 'Financial': [], 'Dates': [],
        'Signatures': [], 'Selections': [], 'Other': []
    };

    const personalKeys = /fullName|name|ssn|dateOfBirth|dob|gender|sex|suffix/i;
    const contactKeys = /address|phone|email|fax|city|state|zip|street|country/i;
    const serviceKeys = /vaFileNumber|serviceNumber|military|branch|rank|veteran|duty/i;
    const medicalKeys = /medical|diagnosis|treatment|condition|medication|doctor|health|disability/i;
    const financialKeys = /income|asset|expense|debt|salary|amount|financial|bank|insurance/i;
    const dateKeys = /date/i;
    const sigKeys = /signature|sign|certif|attest|witness/i;

    for (const [key, def] of Object.entries(props)) {
        const entry = { key, def };
        if (personalKeys.test(key)) sections['Personal'].push(entry);
        else if (contactKeys.test(key)) sections['Contact'].push(entry);
        else if (serviceKeys.test(key)) sections['Service & Benefits'].push(entry);
        else if (medicalKeys.test(key)) sections['Medical'].push(entry);
        else if (financialKeys.test(key)) sections['Financial'].push(entry);
        else if (sigKeys.test(key)) sections['Signatures'].push(entry);
        else if (def.type === 'boolean') sections['Selections'].push(entry);
        else if (dateKeys.test(key) || def.format === 'date') sections['Dates'].push(entry);
        else sections['Other'].push(entry);
    }

    return Object.fromEntries(Object.entries(sections).filter(([, v]) => v.length > 0));
}

// ─── Humanize property name ───
function humanize(str) {
    return str
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .replace(/[_-]/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase())
        .replace(/\bSsn\b/g, 'SSN')
        .replace(/\bDob\b/g, 'Date of Birth')
        .replace(/\bVa\b/g, 'VA')
        .replace(/\bId\b/g, 'ID')
        .trim();
}

// ─── Export schema as JSON ───
function exportSchema() {
    if (!currentSchema) return;
    const blob = new Blob([JSON.stringify(currentSchema, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (currentSchema.title || 'form') + '-schema.json';
    a.click();
    URL.revokeObjectURL(url);
}

// ─── Search ───
document.getElementById('searchBox').addEventListener('input', function(e) {
    const q = e.target.value.trim();
    if (q.length < 2) {
        if (currentOrg) renderFormList(currentOrg);
        return;
    }

    // Search all orgs
    const listEl = document.getElementById('formList');
    let allMatches = [];
    for (const org of ORGS) {
        const data = allFormsByOrg[org.id];
        if (!data) continue;
        const forms = (data.index.forms || []).filter(f => f.name.toLowerCase().includes(q.toLowerCase()));
        allMatches.push(...forms.map(f => ({ ...f, orgId: org.id, orgLabel: org.label })));
    }

    if (allMatches.length === 0) {
        listEl.innerHTML = '<div style="padding:2rem;text-align:center;color:#aaa;font-size:0.78rem;">No forms match "' + q + '"</div>';
        return;
    }

    listEl.innerHTML = allMatches.slice(0, 60).map(f => {
        const status = f.status || 'unknown';
        const badgeClass = status === 'digitized' ? 'badge-digitized' : 'badge-flat';
        const routing = (f.requires3rdParty === 'Yes' || (f.routingTypes && f.routingTypes.length > 0));
        const safeName = (f.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');

        return `<div class="form-item" data-file="${f.fileName}" onclick="selectForm('${f.orgId}','${f.fileName}','${safeName}')">
            <div class="form-item-info">
                <div class="form-item-name">${f.name}</div>
                <div class="form-item-meta">${f.orgLabel} · ${f.totalFields || 0} fields · ${f.coveragePercent || 0}%</div>
            </div>
            <div class="form-item-badges">
                <span class="form-item-badge ${badgeClass}">${status === 'digitized' ? 'Digitized' : 'Flat'}</span>
                ${routing ? '<span class="form-item-badge badge-routing">3rd Party</span>' : ''}
            </div>
        </div>`;
    }).join('');
});

// ─── Init ───
initTabs();
